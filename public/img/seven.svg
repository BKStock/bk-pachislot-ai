  <text x="50" y="72" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-size="68" font-weight="900" font-style="italic" fill="url(#sevenGrad)" stroke="#ffcc00" stroke-width="1.5" filter="url(#sevenGlow)">7</text>
